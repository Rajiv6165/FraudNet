# Render Blueprint deployment configuration
services:
  - type: web
    name: fraudnet-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Run migrations and then start the Uvicorn web server
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fraudnet-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: fraudnet-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: "*" # Commas-separated Vercel origins can be specified here later

databases:
  - name: fraudnet-db
    databaseName: fraudnet
    user: postgres
    plan: free # Free tier Postgres
