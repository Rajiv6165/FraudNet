version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fraudnet_db
    restart: always
    environment:
      POSTGRES_DB: fraudnet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraudnet"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fraudnet_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fraudnet
      - SYNC_DATABASE_URL=postgresql://postgres:postgres@db:5432/fraudnet
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: fraudnet_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
